# ─────────────────────────────────────────────────────────────
# .github/workflows/build.yml  —  API (Node.js) CI
# ─────────────────────────────────────────────────────────────
name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  ORG: codingfit-academy

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then yarn --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          elif [ -f pnpm-lock.yaml ]; then corepack enable pnpm && pnpm i --frozen-lockfile
          else npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present -- --passWithNoTests

      - name: Type check
        run: npm run type-check --if-present

  docker-build:
    name: Docker Build${{ github.event_name == 'push' && ' & Push' || '' }}
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=stable,enable=${{ github.event_name == 'push' }}
          labels: |
            academy.student=${{ vars.STUDENT_NAME }}
            academy.service=api
            academy.api-type=node

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        if: github.event_name == 'push'
        run: |
          {
            echo "## ✅ Build & Push 완료"
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-api\`"
            echo "- Tag: \`${{ steps.sha.outputs.tag }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> $GITHUB_STEP_SUMMARY
